<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undergraduate Academic Council</title>
    <link rel="stylesheet" href="dist/output.css">
</head>
<body class="bg-black text-white min-h-screen">
    <div id="prism-bg" class="fixed inset-0 -z-10"></div>
    <div class="max-w-6xl mx-auto relative z-10">
        <div id="navbar" class="px-6 pt-6"></div>
        <div id="main-heading"></div>
        <main id="app-shell" class="px-6 pb-10">
            <div id="app"></div>
        </main>

        <div id="footer" class="px-6"></div>
    </div>

    <script>
        (function () {
            const show = (label, err) => {
                const app = document.getElementById('app');
                if (!app) return;
                const pre = document.createElement('pre');
                pre.className = 'mx-6 my-6 p-4 rounded-lg bg-red-950/40 border border-red-500/40 text-red-200 overflow-auto';
                const msg = err && (err.stack || err.message || String(err));
                pre.textContent = `${label}\n\n${msg || 'Unknown error'}`;
                app.replaceChildren(pre);
            };
            window.addEventListener('error', (e) => show('Runtime error', e.error || e.message));
            window.addEventListener('unhandledrejection', (e) => show('Unhandled promise rejection', e.reason));
        })();
    </script>

    <script type="module">
        import { mountUI } from './components/ui.js';
        mountUI();
    </script>
</body>
</html>
